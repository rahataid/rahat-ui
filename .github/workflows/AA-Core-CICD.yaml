name: AA CORE CI/CD  

on:
  workflow_call:
    inputs:
      apps_to_build:
        required: false
        type: string
      vault_path:
        required: true
        default: "testload"
        type: string
      tag_suffix:
        required: true
        type: string
    secrets:
      VAULT_URL:
        required: true
      VAULT_TOKEN:
        required: true
  
concurrency:
  group: aa-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


env:
  CI: false
  REGISTRY: docker.io
  IMAGE_NAMESPACE: esatya

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: k8s-runner-set-rahataid
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: set-matrix
        run: |
          APPS="${{ inputs.apps_to_build }}"
          if [ -z "$APPS" ]; then
            APPS="rahat-ui,community-tool-ui"
          fi

          JSON=$(printf '%s\n' "$APPS" | awk -F',' '{printf "["; for(i=1;i<=NF;i++) printf "\"%s\"%s",$i,(i==NF?"":","); printf "]"}')
          echo "matrix={\"app\":$JSON}" >> $GITHUB_OUTPUT

  build:
    name: Build & Push - ${{ matrix.app }}
    runs-on: k8s-runner-set-rahataid
    needs: setup

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-setuptools \
            build-essential \
            make \
            g++ \
            gcc
    
      # -----------------------------
      # Node + PNPM Setup
      # -----------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.10.0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8.14.1

      - name: Install dependencies
        run: pnpm install

      # -----------------------------
      # Sonarqube Setup
      # -----------------------------
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=rahat-ui
            -Dsonar.projectName=rahat-ui
            -Dsonar.sources=apps/rahat-ui,apps/community-tool-ui
            -Dsonar.sourceEncoding=UTF-8

      # -----------------------------
      # Sonarqube Quality Gate
      # -----------------------------
      - name: Sonar Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      - name: Build application
        run: pnpm nx build ${{ matrix.app }}
    
      # -----------------------------
      # Import Secrets from Vault
      # -----------------------------
      - name: Import Secrets
        id: vault
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;
            github/data/rahat/rahat-ui/demo/aa/${{ inputs.vault_path }} rahat-ui-test | ENV ;

      - name: Create environment file
        run: |
          tee .env <<<"$ENV"

      # -----------------------------
      # Docker Setup
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Git metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "run_number=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      # -----------------------------
      # Docker Build & Push
      # -----------------------------
      - name: Build and Push Docker Image
        timeout-minutes: 30  
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.app }}
          push: false
          load: true
          # Remove or change cache settings
          no-cache: true 
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ inputs.tag_suffix }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ inputs.tag_suffix }}-${{ steps.meta.outputs.short_sha }}-${{ steps.meta.outputs.run_number }}

      # -----------------------------
      # Trivy Scan (TABLE)
      # -----------------------------
      - name: Run Trivy Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            aquasec/trivy:0.65.0 \
            image \
            --scanners vuln \
            --format table \
            --output trivy-${{ matrix.app }}.txt \
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ inputs.tag_suffix }} || true
      
          echo "Listing workspace files"
          ls -lah ${{ github.workspace }}

