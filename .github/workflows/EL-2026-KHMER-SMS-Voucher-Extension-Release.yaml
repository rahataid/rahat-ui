name: EL Release SMS Voucher Khmer Extension 2026 CI/CD
on:
  workflow_dispatch:

env:
  CI: true

jobs:
  rahat-ui:
    name: rahat-ui
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: import env file
        env:
          env_release: ${{ secrets.ENV_EL_RELEASE_SMS_VOUCHER_KHMER_EXTENSION_2026 }}
        run: |
          touch ./.env && echo "$env_release" >> ./.env

      - uses: actions/setup-node@v3
        with:
          node-version: 20.10.0

      - name: Install pnpm
        run: npm install -g pnpm@8.14.1

      - name: Install dependencies
        run: pnpm install

      - name: Build apps
        run: pnpm build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Extract Timestamp
        run: |
          TIMESTAMP=$(date "+%Y-%m-%d_%H-%M-%S")
          echo "timestamp=$TIMESTAMP" >> $GITHUB_ENV

      - name: build && push rahat-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rahat-ui
          push: true
          no-cache: true
          tags: |
            esatya/rahat-ui:el-release-smsvoucher-Khmer-extension-2026
            esatya/rahat-ui:el-release-smsvoucher-Khmer-extension-2026-${{ env.VERSION }}
            esatya/rahat-ui:el-release-smsvoucher-Khmer-extension-2026-${{ env.VERSION }}-${{ env.timestamp }}
