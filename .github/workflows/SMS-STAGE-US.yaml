name: Stage SMS Voucher US CI/CD
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (). Leave empty to use short SHA.'
        required: false
        default: ''

env:
  CI: false

jobs:
  rahat-ui:
    name: rahat-ui
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'action') || contains(github.event.pull_request.title, 'action') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Import Secrets
        uses: hashicorp/vault-action@v2.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            github/data/general/docker/esatya username | DOCKERHUB_USERNAME ;
            github/data/general/docker/esatya password | DOCKERHUB_TOKEN ;
            github/data/rahat/rahat-ui/stage/smsvocher-us rahat-ui | ENV ;

      - name: Create environment file
        run: tee ./.env <<<"$ENV"

      - uses: actions/setup-node@v3
        with:
          node-version: 20.10.0

      - name: Install pnpm
        run: npm install -g pnpm@8.14.1

      - name: Install dependencies
        run: pnpm install

      - name: Build apps
        run: pnpm build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Resolve image tag
        id: tags
        run: |
          BASE="esatya/rahat-ui"
          SUFFIX="stage-sms-voucher-us"
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          SHA="${{ steps.vars.outputs.sha_short }}"

          # Use input tag if provided, otherwise fall back to short SHA
          RESOLVED_TAG="${INPUT_TAG:-$SHA}"

          echo "tags=${BASE}:${SUFFIX},${BASE}:${SUFFIX}-${RESOLVED_TAG}" >> $GITHUB_OUTPUT
          echo "resolved_tag=${RESOLVED_TAG}" >> $GITHUB_OUTPUT

      - name: Build & push rahat-ui
        id: build-push-rahat-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rahat-ui
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.tags.outputs.tags }}

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_tag: ${{ steps.tags.outputs.resolved_tag }}
